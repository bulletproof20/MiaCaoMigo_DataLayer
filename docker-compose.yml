# Docker-compose format version
# (3.8 is stable and sufficient for this type of setup)
# version: '3.8'

services:
  # Service name (you can call it "db", "postgres", etc.)
  db:
    
    # Indicates that we will use a local Dockerfile (in the same folder)
    # This Dockerfile installs pg_cron
    build: .

    # Fixed container name (facilitates commands like docker exec)
    container_name: miacaomigo-db

    # Automatically restarts the container if it crashes
    restart: unless-stopped

    # Environment variables used by PostgreSQL on startup
    environment:
      POSTGRES_USER: postgres        # main DB user
      POSTGRES_PASSWORD: 1234        # user password
      POSTGRES_DB: miacaomigo        # database created automatically

    # Port mapping (host:container)
    ports:
      - "5433:5432"
      # 5433 → port on your PC
      # 5432 → internal PostgreSQL port
      # This avoids conflict with a local PostgreSQL

    volumes:
      # Persistent volume (DB data is not lost when stopping the container)
      - postgres_data:/var/lib/postgresql/data

      # Bootstrap entry (init.sql) + loaders + profiles
      - ./DataBase/Bootstrap:/docker-entrypoint-initdb.d

      # Structural DDL (referenced by Bootstrap/Loaders)
      - ./DataBase/Schema:/docker-entrypoint-initdb.d/Schema

      # COMMENT ON metadata (Bootstrap/Loaders/05_Comments.sql, 08_Service_Comments.sql)
      - ./DataBase/Comments:/docker-entrypoint-initdb.d/Comments

      # Application service functions (Bootstrap/Loaders/06_Services.sql)
      - ./DataBase/Services:/docker-entrypoint-initdb.d/Services

      # Query helpers consumed by Services (fn_pick_*)
      - ./DataBase/Queries:/docker-entrypoint-initdb.d/Queries

      # DataSeed datasets (Bootstrap/Loaders/11_MasterData.sql, 12_DemoData.sql)
      - ./DataBase/DataSeed:/docker-entrypoint-initdb.d/DataSeed

    # Additional configuration passed directly to PostgreSQL
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=miacaomigo


# Persistent volume definition
volumes:
  postgres_data:
    # Volume managed by Docker (you don't need to configure anything)
